<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Zealand | Volcano Excursion</title>

    <link rel="stylesheet" href="../css/excursion.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>

    <div id="app">
        <header class="country-header">
            <h1>{{ countryName }}</h1>
            <p class="date">{{ tripDate }}</p>
        </header>

        <!-- 使用 v-for 遍歷各個地點區塊 -->
        <div v-for="section in sections" :key="section.title">
            <div class="location-section">
                <h2>{{ section.title }}</h2>
            </div>

            <div class="gallery-grid">
                <!-- 使用 v-for 遍歷該地點的所有照片 -->
                <div class="photo-card" v-for="photo in section.photos" :key="photo.url">
                    <div class="photo-container">
                        <!-- data-description 與下面的 caption 共用 photo.desc -->
                        <a :href="photo.url" class="glightbox" :data-description="photo.desc">
                            <img :src="photo.url" :alt="photo.alt">
                        </a>
                    </div>
                    <div class="photo-caption">
                        {{ photo.desc }}
                    </div>
                </div>
            </div>
        </div>

        <a href="../index.html" class="back-btn">← Back to Map Explorer</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script>
        const { createApp, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                // --- 填寫資料 ---
                const countryName = "New Zealand";
                const tripDate = "2024";

                const sections = [
                    {
                        title: "Aucland Volcanic Field | June 2024",
                        photos: [
                            {
                                url: "../../assets/img/excursions/new-zealand/mt_eden_scoria_cone.jpg",
                                alt: "Mt. Eden Scoria Cone",
                                desc: "Mt. Eden Scoria Cone"
                            },
                            {
                                url: "../../assets/img/excursions/new-zealand/mangere_tuff_ring.jpg",
                                alt: "Mangere tuff ring",
                                desc: "Mangere tuff ring"
                            },
                            {
                                url: "../../assets/img/excursions/new-zealand/rangitoto.jpg",
                                alt: "Rangitoto",
                                desc: "Rangitoto"
                            },
                            {
                                url: "../../assets/img/excursions/new-zealand/north_head_tuff_cone.jpg",
                                alt: "North head tuff cone",
                                desc: "North head tuff cone"
                            }
                        ]
                    },
                    {
                        title: "Tongariro National Park | March 2024",
                        photos: [
                            {
                                url: "../../assets/img/excursions/new-zealand/mt_ngauruhoe.jpg",
                                alt: "Mt. Ngauruhoe",
                                desc: "Mt. Ngauruhoe"
                            },
                            {
                                url: "../../assets/img/excursions/new-zealand/mt_ruepahu.jpg",
                                alt: "Mt. Ruepahu",
                                desc: "Mt. Ruepahu"
                            }
                        ]
                    },
                    {
                        title: "Taranaki | June 2024",
                        photos: [
                            {
                                url: "../../assets/img/excursions/new-zealand/taranaki_volcano.jpg",
                                alt: "Taranaki Volcano",
                                desc: "Taranaki Volcano"
                            },
                            {
                                url: "../../assets/img/excursions/new-zealand/volcaniclastic_deposit.jpg",
                                alt: "Volcaniclastic deposit",
                                desc: "Volcaniclastic deposit"
                            }
                        ]
                    }
                ];

                // 當 Vue 渲染完成後，初始化燈箱
                onMounted(() => {
                    nextTick(() => {
                        GLightbox({
                            selector: '.glightbox',
                            touchNavigation: true,
                            descPosition: 'bottom'
                        });
                    });
                });

                return {
                    countryName,
                    tripDate,
                    sections
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
