<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>France | Volcano Excursion</title>

    <link rel="stylesheet" href="../css/excursion.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>

    <div id="app">
        <header class="country-header">
            <h1>{{ countryName }}</h1>
            <p class="date">{{ tripDate }}</p>
        </header>

        <!-- 使用 v-for 遍歷各個地點區塊 -->
        <div v-for="section in sections" :key="section.title">
            <div class="location-section">
                <h2>{{ section.title }}</h2>
            </div>

            <div class="gallery-grid">
                <!-- 使用 v-for 遍歷該地點的所有照片 -->
                <div class="photo-card" v-for="photo in section.photos" :key="photo.url">
                    <div class="photo-container">
                        <!-- data-description 與下面的 caption 共用 photo.desc -->
                        <a :href="photo.url" class="glightbox" :data-description="photo.desc">
                            <img :src="photo.url" :alt="photo.alt">
                        </a>
                    </div>
                    <div class="photo-caption">
                        {{ photo.desc }}
                    </div>
                </div>
            </div>
        </div>

        <a href="../index.html" class="back-btn">← Back to Map Explorer</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script>
        const { createApp, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                // --- 填寫資料 ---
                const countryName = "France";
                const tripDate = "September 2025 & January 2026";

                const sections = [
                    {
                        title: "Chaîne des Puys blablabla | September 2025",
                        photos: [
                            {
                                url: "../../assets/img/excursions/france/volcano_01.jpg",
                                alt: "Puy de Dôme",
                                desc: "Puy de Dôme - A large lava dome in the north of the chain."
                            },
                            {
                                url: "../../assets/img/excursions/france/strata_01.jpg",
                                alt: "Volcanic Strata",
                                desc: "Visible volcanic strata showing multiple eruption cycles."
                            }
                        ]
                    },
                    {
                        title: "Mont-Dore Volcano",
                        photos: [
                            {
                                url: "../../assets/img/excursions/france/crater_01.jpg",
                                alt: "Mont-Dore",
                                desc: "Panoramic view of the glacial valley and volcanic peaks."
                            }
                        ]
                    }
                ];

                // 當 Vue 渲染完成後，初始化燈箱
                onMounted(() => {
                    nextTick(() => {
                        GLightbox({
                            selector: '.glightbox',
                            touchNavigation: true,
                            descPosition: 'bottom'
                        });
                    });
                });

                return {
                    countryName,
                    tripDate,
                    sections
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
