<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>France | Volcano Excursion</title>

    <link rel="stylesheet" href="../css/excursion.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
</head>
<body>

    <header class="country-header">
        <h1>Japan</h1>
        <p class="date">September 2025 & January 2026</p>
    </header>

    <div class="location-section">
        <h2>Izu Oshima blablablabla | September 2025</h2>
    </div>

    <div class="gallery-grid">
        <div class="photo-card">
            <div class="photo-container">
                <a href="../../assets/img/excursions/france/volcano_01.jpg" class="glightbox" data-description="Puy de Dôme - A large lava dome in the north of the chain.">
                    <img src="../../assets/img/excursions/france/volcano_01.jpg" alt="Puy de Dôme">
                </a>
            </div>
            <div class="photo-caption">
                Puy de Dôme - A large lava dome in the north of the chain.
            </div>
        </div>

        <div class="photo-card">
            <div class="photo-container">
                <a href="../../assets/img/excursions/france/strata_01.jpg" class="glightbox" data-description="Visible volcanic strata showing multiple eruption cycles.">
                    <img src="../../assets/img/excursions/france/strata_01.jpg" alt="Volcanic Strata">
                </a>
            </div>
            <div class="photo-caption">
                Visible volcanic strata showing multiple eruption cycles.
            </div>
        </div>
    </div>

    <div class="location-section">
        <h2>Mont-Dore Volcano</h2>
    </div>

    <div class="gallery-grid">
        <div class="photo-card">
            <div class="photo-container">
                <a href="../../assets/img/excursions/france/crater_01.jpg" class="glightbox" data-description="Panoramic view of the glacial valley and volcanic peaks.">
                    <img src="../../assets/img/excursions/france/crater_01.jpg" alt="Mont-Dore">
                </a>
            </div>
            <div class="photo-caption">
                Panoramic view of the glacial valley and volcanic peaks.
            </div>
        </div>
    </div>

    <a href="../index.html" class="back-btn">← Back to Map Explorer</a>

    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script>
        // 初始化燈箱
        const lightbox = GLightbox({
            selector: '.glightbox',
            touchNavigation: true,
            descPosition: 'bottom'
        });
    </script>
</body>
</html>
